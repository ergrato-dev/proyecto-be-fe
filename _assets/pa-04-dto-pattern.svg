<svg width="720" height="400" viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="720" height="400" fill="#0f172a"/>

  <!-- Titulo -->
  <text x="360" y="30" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">Patron DTO — ORM Model vs Pydantic Schema</text>
  <text x="360" y="50" text-anchor="middle" fill="#475569" font-size="11">Separar el modelo de base de datos del contrato de la API</text>

  <!-- ══ TABLA IZQUIERDA: Modelo ORM ══ -->
  <rect x="24" y="64" width="280" height="300" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <!-- Header -->
  <rect x="24" y="64" width="280" height="44" rx="8" fill="#052e16"/>
  <rect x="24" y="96" width="280" height="12" fill="#052e16"/>
  <text x="164" y="86" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">Modelo ORM — User</text>
  <text x="164" y="105" text-anchor="middle" fill="#64748b" font-size="10">models/user.py (SQLAlchemy)</text>
  <!-- Separador columnas -->
  <line x1="140" y1="116" x2="140" y2="356" stroke="#334155" stroke-width="1"/>
  <text x="82" y="129" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">CAMPO</text>
  <text x="210" y="129" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">TIPO</text>
  <line x1="32" y1="132" x2="296" y2="132" stroke="#334155" stroke-width="1"/>

  <!-- Filas ORM -->
  <text x="44" y="150" fill="#94a3b8" font-size="11">id</text>
  <text x="148" y="150" fill="#64748b" font-size="10">UUID (PK, default=uuid4)</text>

  <text x="44" y="170" fill="#94a3b8" font-size="11">email</text>
  <text x="148" y="170" fill="#64748b" font-size="10">str (UNIQUE, INDEX)</text>

  <text x="44" y="190" fill="#94a3b8" font-size="11">full_name</text>
  <text x="148" y="190" fill="#64748b" font-size="10">str (NOT NULL)</text>

  <!-- Fila sensible resaltada -->
  <rect x="28" y="197" width="264" height="22" rx="3" fill="#290d0d"/>
  <text x="44" y="212" fill="#ef4444" font-size="11" font-weight="600">hashed_password</text>
  <text x="148" y="212" fill="#ef4444" font-size="10">str (bcrypt hash)</text>
  <text x="290" y="212" fill="#ef4444" font-size="11" font-weight="700">!</text>

  <text x="44" y="234" fill="#94a3b8" font-size="11">is_active</text>
  <text x="148" y="234" fill="#64748b" font-size="10">bool (default=True)</text>

  <text x="44" y="254" fill="#94a3b8" font-size="11">created_at</text>
  <text x="148" y="254" fill="#64748b" font-size="10">datetime (server_default)</text>

  <text x="44" y="274" fill="#94a3b8" font-size="11">updated_at</text>
  <text x="148" y="274" fill="#64748b" font-size="10">datetime (onupdate)</text>

  <line x1="32" y1="284" x2="296" y2="284" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="44" y="302" fill="#64748b" font-size="9">Representa una fila en la</text>
  <text x="44" y="315" fill="#64748b" font-size="9">tabla "users" de PostgreSQL.</text>
  <text x="44" y="328" fill="#475569" font-size="9">Tiene TODOS los datos incluyendo</text>
  <text x="44" y="341" fill="#475569" font-size="9">el hash de la contrasena.</text>

  <!-- ══ FLECHA CENTRAL ══ -->
  <line x1="310" y1="196" x2="408" y2="196" stroke="#f97316" stroke-width="2" marker-end="url(#ao)"/>
  <text x="359" y="188" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="700">.model_validate</text>
  <text x="359" y="203" text-anchor="middle" fill="#f97316" font-size="9">(user_orm)</text>

  <!-- Badge transformacion -->
  <rect x="316" y="212" width="86" height="30" rx="4" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="359" y="225" text-anchor="middle" fill="#fb923c" font-size="8" font-weight="600">ORM → Dict</text>
  <text x="359" y="237" text-anchor="middle" fill="#64748b" font-size="8">from_attributes=True</text>

  <!-- ══ TABLA DERECHA: Schema Pydantic ══ -->
  <rect x="416" y="64" width="280" height="300" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <!-- Header -->
  <rect x="416" y="64" width="280" height="44" rx="8" fill="#1e3a5f"/>
  <rect x="416" y="96" width="280" height="12" fill="#1e3a5f"/>
  <text x="556" y="86" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">Schema — UserResponse</text>
  <text x="556" y="105" text-anchor="middle" fill="#64748b" font-size="10">schemas/user.py (Pydantic)</text>
  <!-- Separador columnas -->
  <line x1="532" y1="116" x2="532" y2="356" stroke="#334155" stroke-width="1"/>
  <text x="474" y="129" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">CAMPO</text>
  <text x="602" y="129" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">TIPO</text>
  <line x1="424" y1="132" x2="688" y2="132" stroke="#334155" stroke-width="1"/>

  <!-- Filas Schema -->
  <text x="436" y="150" fill="#94a3b8" font-size="11">id</text>
  <text x="540" y="150" fill="#64748b" font-size="10">uuid.UUID</text>

  <text x="436" y="170" fill="#94a3b8" font-size="11">email</text>
  <text x="540" y="170" fill="#64748b" font-size="10">str</text>

  <text x="436" y="190" fill="#94a3b8" font-size="11">full_name</text>
  <text x="540" y="190" fill="#64748b" font-size="10">str</text>

  <!-- Fila omitida -->
  <rect x="420" y="197" width="272" height="22" rx="3" fill="#0d1117"/>
  <text x="436" y="212" fill="#334155" font-size="11" text-decoration="line-through">hashed_password</text>
  <text x="600" y="212" fill="#22c55e" font-size="12" font-weight="700">✓ OMITIDA</text>

  <text x="436" y="234" fill="#94a3b8" font-size="11">is_active</text>
  <text x="540" y="234" fill="#64748b" font-size="10">bool</text>

  <text x="436" y="254" fill="#94a3b8" font-size="11">created_at</text>
  <text x="540" y="254" fill="#64748b" font-size="10">datetime</text>

  <text x="436" y="274" fill="#94a3b8" font-size="11">updated_at</text>
  <text x="540" y="274" fill="#64748b" font-size="10">datetime</text>

  <line x1="424" y1="284" x2="688" y2="284" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="436" y="302" fill="#64748b" font-size="9">Define EXACTAMENTE lo que</text>
  <text x="436" y="315" fill="#64748b" font-size="9">la API retorna al cliente.</text>
  <text x="436" y="328" fill="#22c55e" font-size="9">NUNCA expone hashed_password.</text>
  <text x="436" y="341" fill="#475569" font-size="9">response_model lo filtra auto.</text>

  <!-- Nota inferior -->
  <rect x="24" y="375" width="672" height="18" rx="4" fill="#1e293b"/>
  <text x="360" y="388" text-anchor="middle" fill="#64748b" font-size="10">response_model=UserResponse en el endpoint garantiza que FastAPI filtre automaticamente cualquier campo no declarado en el schema.</text>
</svg>
