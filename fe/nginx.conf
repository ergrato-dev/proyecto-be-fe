# ========================
# NN Auth System — Configuración de Nginx para Frontend SPA
# ========================
# ¿Qué? Configuración de Nginx para servir la aplicación React como Single Page App (SPA).
# ¿Para qué? React Router maneja las rutas en el cliente (browser), no en el servidor.
#            Sin esta config, Nginx devolvería 404 al acceder directamente a /dashboard,
#            /login u otras rutas que no são archivos físicos en el disco.
# ¿Impacto? Con try_files $uri /index.html, cualquier ruta desconocida devuelve index.html
#           y React Router se encarga del resto. Sin esto, la app sólo funcionaría en /.

server {
    # ¿Qué? Puerto en que Nginx escucha las peticiones HTTP.
    # ¿Para qué? Puerto estándar HTTP — docker-compose.yml lo mapea al host.
    listen 80;
    server_name localhost;

    # ¿Qué? Directorio raíz donde están los archivos estáticos compilados.
    # ¿Para qué? Nginx buscará aquí los archivos cuando reciba una petición.
    # ¿Impacto? Debe coincidir con el destino del COPY en el Dockerfile.
    root /usr/share/nginx/html;
    index index.html;

    # ¿Qué? Configuración de compresión gzip para reducir el tamaño de respuestas.
    # ¿Para qué? Los archivos JS/CSS compilados suelen ser grandes — gzip los comprime
    #            hasta un 70%, mejorando el tiempo de carga inicial de la app.
    # ¿Impacto? Sin esto, el navegador descargaría archivos más pesados innecesariamente.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ────────────────────────────
    # 🗂️ Ruta principal — SPA fallback
    # ────────────────────────────
    location / {
        # ¿Qué? Intenta servir el archivo exacto ($uri), luego el directorio ($uri/),
        #        y si ninguno existe, sirve index.html.
        # ¿Para qué? Soportar el enrutamiento de React Router en el lado del cliente.
        #             Al recargar /dashboard, Nginx sirve index.html y React Router
        #             muestra el componente correcto.
        # ¿Impacto? Sin esta directiva, cada recarga de página en una ruta secundaria
        #           devolvería 404, rompiendo la navegación.
        try_files $uri $uri/ /index.html;
    }

    # ────────────────────────────
    # 📦 Assets estáticos — cache agresivo con hash de contenido
    # ────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        # ¿Qué? Cache de 1 año para archivos estáticos con nombre inmutable (hash de contenido).
        # ¿Para qué? Vite genera nombres como main.a1b2c3d4.js — si el contenido cambia,
        #            el hash cambia y el navegador descarga el archivo nuevo automáticamente.
        # ¿Impacto? Mejora drásticamente la performance en visitas repetidas — el navegador
        #           no vuelve a descargar assets que no cambiaron.
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ────────────────────────────
    # 🚫 Seguridad — ocultar versión de Nginx
    # ────────────────────────────
    # ¿Qué? Oculta la versión de Nginx en las cabeceras de respuesta.
    # ¿Para qué? No exponer información del servidor que podría ser usada por atacantes.
    # ¿Impacto? Sin esto, el header "Server: nginx/1.xx.x" revela la versión exacta.
    server_tokens off;
}
